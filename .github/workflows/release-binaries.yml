name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libssl-dev libasio-dev libboost-system-dev cmake

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install cairo pango openssl boost cmake pkg-config

      - name: Install dependencies (Windows - MSYS2)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-pkgconf

      - name: Build (Ubuntu / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc || sysctl -n hw.ncpu)

      - name: Build (Windows MSYS2)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release
          ninja

      - name: Package Binary (Ubuntu / macOS)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czvf QuoteAPI-${{ matrix.os }}.tar.gz -C build QuoteAPI

      - name: Package Binary (Windows MSYS2)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          tar -czvf QuoteAPI-${{ matrix.os }}.tar.gz -C build QuoteAPI.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuoteAPI-${{ matrix.os }}
          path: QuoteAPI-${{ matrix.os }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
